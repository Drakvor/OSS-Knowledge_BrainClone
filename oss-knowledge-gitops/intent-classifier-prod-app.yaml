apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
    name: intent-classifier-prod
    namespace: argocd
spec:
    project: default
    source:
        repoURL: https://gitlab.4.230.158.187.nip.io/oss-ai-vtf/oss-knowledge-gitops.git
        targetRevision: HEAD
        path: backend/intent-classifier/overlays/prod
    destination:
        server: https://kubernetes.default.svc
        namespace: oss-knowledge-prod
    syncPolicy:
        automated:
            prune: true
            selfHeal: true
        syncOptions:
            - CreateNamespace=true
