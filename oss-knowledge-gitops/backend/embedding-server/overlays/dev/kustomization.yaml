apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: oss-knowledge-embedding-dev
resources:
- ../../base
namePrefix: dev-
patches:
- path: deployment-patch.yaml
- path: ingress-patch.yaml

images:
- name: oss-knowledge-embedding-server
  newName: ossknowledgeregistry.azurecr.io/oss-knowledge-embedding-server
  newTag: latest

labels:
- includeSelectors: false
  pairs:
    environment: dev