apiVersion: apps/v1
kind: Deployment
metadata:
  name: embedding-server
spec:
  replicas: 1
  template:
    spec:
      containers:
      - name: embedding-server
        image: oss-knowledge-embedding-server:dev
        env:
        - name: DEBUG
          value: "true"
        - name: LOG_LEVEL
          value: "DEBUG"
        - name: QDRANT_URL
          value: "http://20.249.165.27:6333"
        - name: NEO4J_URI
          value: "neo4j://20.249.160.53:7687"
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "2Gi"
            cpu: "1000m"