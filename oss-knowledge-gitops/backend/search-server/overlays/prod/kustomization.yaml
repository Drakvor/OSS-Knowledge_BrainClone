apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: oss-knowledge-search-prod
resources:
- ../../base
patches:
- path: deployment-patch.yaml

images:
- name: oss-knowledge-search-server
  newName: ossknowledgeregistry.azurecr.io/oss-knowledge-search-server
  newTag: latest

labels:
- includeSelectors: false
  pairs:
    environment: prod