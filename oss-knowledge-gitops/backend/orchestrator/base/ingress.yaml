apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
    name: orchestrator
    annotations:
        nginx.ingress.kubernetes.io/rewrite-target: /
spec:
    ingressClassName: nginx
    rules:
        - host: oss-knowledge-orchestrator.4.230.158.187.nip.io
          http:
              paths:
                  - path: /
                    pathType: Prefix
                    backend:
                        service:
                            name: orchestrator
                            port:
                                number: 8000

