apiVersion: apps/v1
kind: Deployment
metadata:
    name: orchestrator
    labels:
        app: orchestrator
spec:
    replicas: 1
    selector:
        matchLabels:
            app: orchestrator
    template:
        metadata:
            labels:
                app: orchestrator
        spec:
            containers:
                - name: orchestrator
                  image: oss-knowledge-orchestrator:latest
                  imagePullPolicy: Always
                  ports:
                      - containerPort: 8000
                  env:
                      - name: APP_NAME
                        value: "OSS Knowledge Orchestrator"
                      - name: DEBUG
                        value: "false"
                      - name: LOG_LEVEL
                        value: "INFO"
                      - name: HOST
                        value: "0.0.0.0"
                      - name: PORT
                        value: "8000"
                      - name: CONTEXT_MANAGER_URL
                        value: "http://context-manager.oss-knowledge-backend:8005"
                      - name: INTENT_CLASSIFIER_URL
                        value: "http://intent-classifier.oss-knowledge-backend:8001"
                      - name: SEARCH_SERVER_URL
                        value: "http://search-server.oss-knowledge-backend:8002"
                      - name: TASK_PLANNER_URL
                        value: "http://task-planner.oss-knowledge-backend:8004"
                      - name: BACKEND_SERVICE_URL
                        value: "http://meta-api.oss-knowledge-backend:8080"
                      - name: USE_TASK_PLANNER
                        value: "false"
                      - name: OPENAI_API_KEY
                        valueFrom:
                            secretKeyRef:
                                name: api-keys
                                key: gpt-api-key
                      - name: AZURE_OPENAI_ENDPOINT
                        value: "https://multiagent-openai-service.openai.azure.com/"
                      - name: AZURE_OPENAI_API_VERSION
                        value: "2024-12-01-preview"
                      - name: AZURE_OPENAI_DEPLOYMENT
                        value: "gpt-4.1-mini"
                  resources:
                      requests:
                          memory: "256Mi"
                          cpu: "125m"
                      limits:
                          memory: "512Mi"
                          cpu: "250m"
                  livenessProbe:
                      httpGet:
                          path: /health
                          port: 8000
                      initialDelaySeconds: 30
                      periodSeconds: 30
                  readinessProbe:
                      httpGet:
                          path: /health
                          port: 8000
                      initialDelaySeconds: 5
                      periodSeconds: 5

