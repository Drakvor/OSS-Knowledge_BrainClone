apiVersion: apps/v1
kind: Deployment
metadata:
    name: intent-classifier
spec:
    template:
        spec:
            containers:
                - name: intent-classifier
                  env:
                      - name: DEBUG
                        value: "true"
                      - name: LOG_LEVEL
                        value: "DEBUG"
                  resources:
                      requests:
                          memory: "1Gi"
                          cpu: "500m"
                      limits:
                          memory: "4Gi"
                          cpu: "2000m"
                  livenessProbe:
                      httpGet:
                          path: /health
                          port: 8001
                      initialDelaySeconds: 120
                      periodSeconds: 30
                      timeoutSeconds: 10
                      failureThreshold: 3
                  readinessProbe:
                      httpGet:
                          path: /health
                          port: 8001
                      initialDelaySeconds: 60
                      periodSeconds: 10
                      timeoutSeconds: 5
                      failureThreshold: 3
