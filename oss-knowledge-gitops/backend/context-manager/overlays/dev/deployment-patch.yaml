apiVersion: apps/v1
kind: Deployment
metadata:
    name: context-manager
spec:
    replicas: 1
    template:
        spec:
            containers:
                - name: context-manager
                  image: oss-knowledge-context-manager:dev
                  env:
                      - name: DEBUG
                        value: "true"
                      - name: LOG_LEVEL
                        value: "DEBUG"
                  resources:
                      requests:
                          memory: "256Mi"
                          cpu: "125m"
                      limits:
                          memory: "512Mi"
                          cpu: "250m"

