apiVersion: apps/v1
kind: Deployment
metadata:
  name: oss-knowledge-front
  labels:
    app: oss-knowledge-front
spec:
  replicas: 2
  selector:
    matchLabels:
      app: oss-knowledge-front
  template:
    metadata:
      labels:
        app: oss-knowledge-front
    spec:
      containers:
      - name: oss-knowledge-front
        image: oss-knowledge-front:latest
        ports:
        - containerPort: 8080
        envFrom:
        - configMapRef:
            name: oss-knowledge-front-config
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 5